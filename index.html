<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4K P2P Stream</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            color: white;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button {
            background: #6366f1;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #4f46e5;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #status-pill {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            items-center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
        }

        #room-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-weight: 900;
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <video id="mainVideo" autoplay playsinline></video>
        <div id="status-pill">LIVE 4K P2P</div>
        <div id="room-info">ROOM: <span id="roomName">...</span></div>
        <div id="controls">
            <button id="goLive">Go Live 4K UHD</button>
            <button id="toggleMute">🎤</button>
            <button id="toggleFS">⛶ Fullscreen</button>
        </div>
    </div>
    <div id="audio-container" style="display:none"></div>

    <script>
        const socket = io('https://back.tatinenikarthik.online', { path: '/socket.io/' });
        const roomId = window.location.pathname.split('/').pop() || 'lobby';
        document.getElementById('roomName').innerText = roomId.toUpperCase();

        const pcs = new Map();
        const mainVideo = document.getElementById('mainVideo');
        const audioContainer = document.getElementById('audio-container');
        let localMic = null;
        let isMuted = false;

        async function init() {
            try { localMic = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (err) { }

            socket.on('connect', () => socket.emit('join', roomId));
            socket.on('peers', peers => peers.forEach(sid => createPC(sid, true)));
            socket.on('peerJoined', sid => createPC(sid, false));
            socket.on('peerLeft', sid => {
                const pc = pcs.get(sid);
                if (pc) pc.close();
                pcs.delete(sid);
            });

            socket.on('signal', async ({ sender, signal }) => {
                const pc = createPC(sender, false);
                if (signal.type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit('signal', { target: sender, signal: pc.localDescription });
                } else if (signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal));
                } else if (signal.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(signal.candidate)).catch(() => { });
                }
            });
        }

        function createPC(sid, isInitiator) {
            if (pcs.has(sid)) return pcs.get(sid);
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] });
            pcs.set(sid, pc);

            pc.onicecandidate = e => e.candidate && socket.emit('signal', { target: sid, signal: { candidate: e.candidate } });
            pc.ontrack = e => {
                const s = e.streams[0];
                if (e.track.kind === 'video') {
                    mainVideo.srcObject = s;
                } else {
                    let a = document.getElementById('audio-' + sid);
                    if (!a) {
                        a = document.createElement('audio');
                        a.id = 'audio-' + sid;
                        a.autoplay = true;
                        audioContainer.appendChild(a);
                    }
                    a.srcObject = s;
                }
            };

            if (localMic) localMic.getTracks().forEach(t => pc.addTrack(t, localMic));

            if (isInitiator) {
                pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => socket.emit('signal', { target: sid, signal: pc.localDescription }));
            }
            return pc;
        }

        document.getElementById('goLive').onclick = async () => {
            try {
                const screen = await navigator.mediaDevices.getDisplayMedia({ video: { width: 3840, height: 2160, frameRate: 60 }, audio: true });
                mainVideo.srcObject = screen;
                pcs.forEach(async (pc, sid) => {
                    screen.getTracks().forEach(t => pc.addTrack(t, screen));
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    socket.emit('signal', { target: sid, signal: pc.localDescription });
                });
                document.getElementById('goLive').innerText = 'Streaming';
                document.getElementById('goLive').style.background = '#059669';
            } catch (e) { alert('Stream Failed'); }
        };

        document.getElementById('toggleMute').onclick = () => {
            if (localMic) {
                const t = localMic.getAudioTracks()[0];
                t.enabled = !t.enabled;
                isMuted = !t.enabled;
                document.getElementById('toggleMute').innerText = isMuted ? '🔇' : '🎤';
                document.getElementById('toggleMute').style.background = isMuted ? '#ef4444' : '#6366f1';
            }
        };

        document.getElementById('toggleFS').onclick = () => {
            if (mainVideo.requestFullscreen) mainVideo.requestFullscreen();
            else if (mainVideo.webkitEnterFullscreen) mainVideo.webkitEnterFullscreen();
        };

        init();
    </script>
</body>

</html>
